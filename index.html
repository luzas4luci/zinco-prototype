<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zinco · Laboral — Prototipo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --zinco-green: #3D6740;
      --zinco-green-dark: #2C4A2E;
      --zinco-green-tint: #E9F0EA;
      --bg-page: #F7F8F7;
      --bg-card: #FFFFFF;
      --ok: #3D6740;
      --warn: #B45309;
      --warn-bg: #FEF3C7;
      --alert: #B91C1C;
      --alert-bg: #FEE2E2;
      --text: #1B1F1B;
      --text-soft: #5F6B60;
      --line: #E4E8E4;
      --radius: 14px;
      --font: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---------- Topbar ---------- */
    .topbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wordmark {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--zinco-green);
      white-space: nowrap;
    }
    .empresa-select {
      font-family: var(--font);
      font-size: 0.85rem;
      color: var(--text);
      background: var(--bg-page);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      max-width: 100%;
    }
    .toggle {
      margin-left: auto;
      display: flex;
      background: var(--bg-page);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
    }
    .toggle button {
      font-family: var(--font);
      font-size: 0.83rem;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--text-soft);
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
    }
    .toggle button.active {
      background: var(--zinco-green);
      color: #fff;
    }

    /* ---------- Layout ---------- */
    .container { max-width: 980px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ---------- Tabs (vista Asesor) ---------- */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 22px;
      overflow-x: auto;
    }
    .tabs button {
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--bg-card);
      color: var(--text-soft);
      cursor: pointer;
      white-space: nowrap;
    }
    .tabs button.active {
      background: var(--zinco-green-tint);
      border-color: var(--zinco-green);
      color: var(--zinco-green-dark);
    }

    /* ---------- Cards ---------- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: 0 1px 3px rgba(27, 31, 27, 0.05);
      margin-bottom: 12px;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 2px; }
    .sub { color: var(--text-soft); font-size: 0.87rem; margin-bottom: 22px; }
    h2 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-soft);
      margin: 26px 0 10px;
    }

    /* ---------- Contadores-resumen ---------- */
    .resumen { display: flex; gap: 12px; flex-wrap: wrap; }
    .resumen .card { flex: 1; min-width: 200px; margin-bottom: 0; }
    .kpi .num { font-size: 1.8rem; font-weight: 800; line-height: 1.2; }
    .kpi .num .unidad { font-size: 1rem; font-weight: 700; color: var(--text-soft); }
    .kpi .num.warn { color: var(--warn); }
    .kpi .label { font-size: 0.78rem; font-weight: 600; margin-top: 2px; }
    .kpi .nota { font-size: 0.74rem; color: var(--text-soft); margin-top: 4px; }
    .kpi .nota.warn { color: var(--warn); }
    .kpi .nota.ok { color: var(--ok); }
    .barra { height: 6px; background: var(--zinco-green-tint); border-radius: 999px; margin-top: 8px; overflow: hidden; }
    .barra > div { height: 100%; background: var(--zinco-green); border-radius: 999px; }

    /* ---------- Requiere acción ---------- */
    .tarea { display: flex; gap: 14px; align-items: flex-start; }
    .tarea .cuerpo { flex: 1; }
    .tarea h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .tarea p { font-size: 0.85rem; color: var(--text-soft); line-height: 1.45; }
    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge.warn  { background: var(--warn-bg);  color: var(--warn); }
    .badge.alert { background: var(--alert-bg); color: var(--alert); }
    .badge.ok    { background: var(--zinco-green-tint); color: var(--ok); }
    .cta {
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--zinco-green-dark);
      background: var(--zinco-green-tint);
      border: none;
      border-radius: 9px;
      padding: 7px 14px;
      margin-top: 10px;
      cursor: pointer;
    }
    .cta:hover { background: var(--zinco-green); color: #fff; }

    /* ---------- Hecho hoy ---------- */
    .hecho { display: flex; gap: 12px; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--line); }
    .hecho:last-child { border-bottom: none; }
    .hecho .hora { font-size: 0.75rem; color: var(--text-soft); font-variant-numeric: tabular-nums; }
    .hecho .texto { font-size: 0.85rem; }
    .hecho .texto::before { content: "✓ "; color: var(--ok); font-weight: 700; }

    /* ---------- Tab ITs ---------- */
    .it-card { cursor: pointer; transition: box-shadow 0.15s; }
    .it-card:hover { box-shadow: 0 3px 10px rgba(27, 31, 27, 0.1); }
    .it-head { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
    .it-head .quien { flex: 1; min-width: 180px; }
    .it-head h3 { font-size: 1rem; font-weight: 700; }
    .it-head .puesto { font-size: 0.8rem; color: var(--text-soft); }
    .it-head .tipo { font-size: 0.82rem; color: var(--text-soft); margin-top: 3px; }
    .it-dias { text-align: right; }
    .it-dias .num { font-size: 1.7rem; font-weight: 800; line-height: 1.1; }
    .it-dias .label { font-size: 0.72rem; color: var(--text-soft); }
    .chip {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--bg-page);
      border: 1px solid var(--line);
      color: var(--text-soft);
    }
    .chip.warn { background: var(--warn-bg); border-color: var(--warn-bg); color: var(--warn); }
    .chip.ok   { background: var(--zinco-green-tint); border-color: var(--zinco-green-tint); color: var(--ok); }
    .it-estado { font-size: 0.82rem; margin-top: 10px; }
    .it-estado.warn { color: var(--warn); }
    .it-estado.ok { color: var(--ok); }

    .hitos { display: flex; margin-top: 18px; }
    .hito { flex: 1; text-align: center; position: relative; }
    .hito .punto {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--bg-card);
      border: 3px solid var(--line);
      margin: 0 auto 6px;
      position: relative; z-index: 1;
    }
    .hito.done .punto { background: var(--ok); border-color: var(--ok); }
    .hito::before {
      content: "";
      position: absolute;
      top: 6px; left: -50%; width: 100%;
      height: 2px;
      background: var(--line);
    }
    .hito.done::before { background: var(--ok); }
    .hito:first-child::before { display: none; }
    .hito .hlabel { font-size: 0.68rem; font-weight: 600; line-height: 1.25; padding: 0 4px; }
    .hito .hfecha { font-size: 0.66rem; color: var(--text-soft); margin-top: 2px; }
    .it-abrir { font-size: 0.76rem; color: var(--text-soft); margin-top: 16px; text-align: right; }

    /* ---------- Modal ---------- */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(27, 31, 27, 0.45);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    .modal {
      background: var(--bg-card);
      border-radius: var(--radius);
      max-width: 560px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      padding: 24px;
      position: relative;
      box-shadow: 0 12px 40px rgba(27, 31, 27, 0.25);
    }
    .modal .cerrar {
      position: absolute; top: 12px; right: 14px;
      font-size: 1.3rem; line-height: 1;
      border: none; background: transparent;
      color: var(--text-soft); cursor: pointer;
      padding: 6px;
    }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
    .modal .msub { font-size: 0.82rem; color: var(--text-soft); margin-bottom: 16px; }
    .tl { border-left: 2px solid var(--line); margin: 14px 0 4px 7px; padding-left: 18px; }
    .tl-item { position: relative; padding-bottom: 14px; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-item::before {
      content: "";
      position: absolute; left: -25px; top: 3px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--bg-card);
      border: 3px solid var(--line);
    }
    .tl-item.done::before { background: var(--ok); border-color: var(--ok); }
    .tl-item.pend::before { background: var(--warn); border-color: var(--warn); }
    .tl-item .tfecha { font-size: 0.72rem; color: var(--text-soft); }
    .tl-item .ttexto { font-size: 0.85rem; line-height: 1.4; }
    .tl-item.pend .ttexto { color: var(--warn); font-weight: 600; }
    .zinco-ahora {
      background: var(--zinco-green-tint);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 18px;
    }
    .zinco-ahora .zt { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--zinco-green-dark); margin-bottom: 6px; }
    .zinco-ahora p { font-size: 0.85rem; line-height: 1.5; color: var(--text); }

    /* ---------- Placeholder ---------- */
    .placeholder { text-align: center; padding: 44px 20px; color: var(--text-soft); font-size: 0.9rem; }

    @media (max-width: 640px) {
      .topbar { padding: 12px 14px; gap: 10px; }
      .toggle { margin-left: 0; }
      .container { padding: 18px 14px 48px; }
      .resumen { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <span class="wordmark">Zinco · Laboral</span>
    <select class="empresa-select" id="empresaSelect" aria-label="Empresa"></select>
    <div class="toggle" role="tablist" aria-label="Vista">
      <button id="btnAsesor" class="active">Asesor</button>
      <button id="btnCliente">Cliente</button>
    </div>
  </header>

  <main class="container">

    <!-- ================= VISTA ASESOR ================= -->
    <section id="vistaAsesor">
      <nav class="tabs" id="tabsNav">
        <button data-tab="hoy" class="active">Hoy</button>
        <button data-tab="its">ITs</button>
        <button data-tab="nominas">Nóminas</button>
        <button data-tab="movs">Altas y Bajas</button>
      </nav>

      <!-- ---- Tab HOY ---- -->
      <div id="tab-hoy">
        <h1>Hoy</h1>
        <p class="sub" id="subHoy"></p>

        <div class="resumen" id="resumenHoy"></div>

        <h2>Requiere acción</h2>
        <div id="bandeja"></div>

        <h2>Hecho hoy</h2>
        <div class="card" id="hechoHoy"></div>
      </div>

      <!-- ---- Tab ITs ---- -->
      <div id="tab-its" hidden>
        <h1>Incapacidades temporales</h1>
        <p class="sub" id="subITs"></p>
        <div id="listaITs"></div>
      </div>

      <!-- ---- Tab Nóminas ---- -->
      <div id="tab-nominas" hidden>
        <div class="card placeholder">La tab de Nóminas se construye en una próxima iteración.</div>
      </div>

      <!-- ---- Tab Altas y Bajas ---- -->
      <div id="tab-movs" hidden>
        <div class="card placeholder">La tab de Altas y Bajas se construye en una próxima iteración.</div>
      </div>
    </section>

    <!-- ================= VISTA CLIENTE ================= -->
    <section id="vistaCliente" hidden>
      <div class="card placeholder">
        La vista cliente se construye en una próxima iteración.
      </div>
    </section>

  </main>

  <script src="data.js"></script>
  <script>
    const D = window.DATA;
    const HOY = fecha(D.hoy);

    // ---------- utilidades de fechas ----------
    function fecha(iso) { return new Date(iso + "T12:00:00"); }
    function diasEntre(a, b) { return Math.round((b - a) / 86400000); }
    function fmtCorta(d) {
      return String(d.getDate()).padStart(2, "0") + "/" + String(d.getMonth() + 1).padStart(2, "0");
    }
    // Suma n días hábiles (lunes-viernes) a una fecha
    function sumaDiasHabiles(d, n) {
      const r = new Date(d);
      while (n > 0) {
        r.setDate(r.getDate() + 1);
        const dia = r.getDay();
        if (dia !== 0 && dia !== 6) n--;
      }
      return r;
    }

    // ---------- reglas de semáforo (calculadas, no hardcodeadas) ----------
    // Devuelve { nivel: 'alert'|'warn'|'ok', sla: texto del badge }
    function semaforoTarea(t) {
      if (t.tipo === "it-parte") {
        const it = D.its.find(i => i.id === t.ref);
        const diasPendiente = diasEntre(fecha(it.partePendienteDesde), HOY);
        if (diasPendiente > 5) return { nivel: "warn", sla: "Pendiente " + diasPendiente + " días" };
        return { nivel: "ok", sla: "Pendiente " + diasPendiente + " días" };
      }
      if (t.tipo === "baja-ss") {
        const baja = D.movimientos.bajas.find(b => b.empleadoId === t.empleadoId);
        const limite = sumaDiasHabiles(fecha(baja.ultimoDia), 3); // plazo legal: 3 días hábiles
        const diasHastaLimite = diasEntre(HOY, limite);
        if (diasHastaLimite < 1) return { nivel: "alert", sla: diasHastaLimite < 0 ? "PLAZO VENCIDO" : "Plazo RED: HOY" };
        return { nivel: "ok", sla: "Plazo RED: " + fmtCorta(limite) };
      }
      // genérico por fecha de vencimiento
      const diasHasta = diasEntre(HOY, fecha(t.vence));
      if (diasHasta <= 0) return { nivel: "alert", sla: "Vence hoy" };
      if (diasHasta <= 4) return { nivel: "warn", sla: diasHasta + " día" + (diasHasta === 1 ? "" : "s") };
      return { nivel: "ok", sla: "En plazo · " + fmtCorta(fecha(t.vence)) };
    }
    const ORDEN_NIVEL = { alert: 0, warn: 1, ok: 2 };

    // ---------- topbar ----------
    const sel = document.getElementById("empresaSelect");
    const opt = document.createElement("option");
    opt.textContent = D.empresa.etiquetaSelector;
    sel.appendChild(opt);

    // toggle Asesor / Cliente
    const btnAsesor = document.getElementById("btnAsesor");
    const btnCliente = document.getElementById("btnCliente");
    const vistaAsesor = document.getElementById("vistaAsesor");
    const vistaCliente = document.getElementById("vistaCliente");
    function setVista(cliente) {
      vistaAsesor.hidden = cliente;
      vistaCliente.hidden = !cliente;
      btnAsesor.classList.toggle("active", !cliente);
      btnCliente.classList.toggle("active", cliente);
    }
    btnAsesor.addEventListener("click", () => setVista(false));
    btnCliente.addEventListener("click", () => setVista(true));

    // ---------- navegación de tabs ----------
    const tabsNav = document.getElementById("tabsNav");
    tabsNav.addEventListener("click", e => {
      const btn = e.target.closest("button[data-tab]");
      if (!btn) return;
      tabsNav.querySelectorAll("button").forEach(b => b.classList.toggle("active", b === btn));
      ["hoy", "its", "nominas", "movs"].forEach(id => {
        document.getElementById("tab-" + id).hidden = id !== btn.dataset.tab;
      });
    });

    // ---------- tab HOY ----------
    document.getElementById("subHoy").textContent =
      D.hoyTexto.charAt(0).toUpperCase() + D.hoyTexto.slice(1) + " · " + D.empresa.nombre;

    // contadores-resumen (calculados desde data.js)
    const itsConAviso = D.its.filter(it =>
      it.partePendienteDesde && diasEntre(fecha(it.partePendienteDesde), HOY) > 5
    ).length;
    const altasPendientes = D.movimientos.altas.filter(a => !a.comunicadaRED).length;
    const bajasPorComunicar = D.movimientos.bajas.filter(b => !b.comunicadaRED).length;
    const avance = D.nominas.mesActual;

    document.getElementById("resumenHoy").innerHTML = `
      <div class="card kpi">
        <div class="num ${itsConAviso ? "warn" : ""}">${D.its.length}</div>
        <div class="label">ITs activas</div>
        <div class="nota ${itsConAviso ? "warn" : "ok"}">${itsConAviso ? "⚠ " + itsConAviso + " con parte pendiente de la mutua" : "✓ Todas al día"}</div>
      </div>
      <div class="card kpi">
        <div class="num">${altasPendientes + bajasPorComunicar}</div>
        <div class="label">Movimientos pendientes de comunicar</div>
        <div class="nota ${altasPendientes + bajasPorComunicar ? "" : "ok"}">${
          altasPendientes + bajasPorComunicar
            ? bajasPorComunicar + " baja por comunicar al RED (en plazo)"
            : "✓ Todo comunicado al Sistema RED"
        }</div>
      </div>
      <div class="card kpi">
        <div class="num">${avance.avancePct}<span class="unidad"> %</span></div>
        <div class="label">Nóminas de ${avance.mes.toLowerCase()}</div>
        <div class="barra"><div style="width:${avance.avancePct}%"></div></div>
        <div class="nota">${avance.etapa}</div>
      </div>
    `;

    // lista "Requiere acción" ordenada por urgencia calculada
    const bandeja = document.getElementById("bandeja");
    D.bandeja
      .map(t => ({ ...t, sem: semaforoTarea(t) }))
      .sort((a, b) =>
        ORDEN_NIVEL[a.sem.nivel] - ORDEN_NIVEL[b.sem.nivel] || a.prioridad - b.prioridad
      )
      .forEach(t => {
        const card = document.createElement("div");
        card.className = "card tarea";
        card.innerHTML = `
          <div class="cuerpo">
            <h3>${t.titulo}</h3>
            <p>${t.detalle}</p>
            <button class="cta">${t.cta}</button>
          </div>
          <span class="badge ${t.sem.nivel}">${t.sem.sla}</span>
        `;
        bandeja.appendChild(card);
      });

    // feed "Hecho hoy"
    const feed = document.getElementById("hechoHoy");
    D.hechoHoy.forEach(h => {
      const row = document.createElement("div");
      row.className = "hecho";
      row.innerHTML = `<span class="hora">${h.hora}</span><span class="texto">${h.texto}</span>`;
      feed.appendChild(row);
    });

    // ---------- tab ITs ----------
    // chip "quién tiene la pelota": ámbar cuando esperamos a un tercero
    function chipPelota(it) {
      const clase = it.pelota === "Mutua" ? "warn" : it.pelota === "Zinco" ? "ok" : "";
      return `<span class="chip ${clase}">La pelota la tiene: ${it.pelota}</span>`;
    }
    function fmtLarga(iso) {
      const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
      const d = fecha(iso);
      return d.getDate() + " de " + MESES[d.getMonth()];
    }

    document.getElementById("subITs").textContent =
      D.its.length + " bajas activas · " + D.empresa.nombre;

    const listaITs = document.getElementById("listaITs");
    D.its.forEach(it => {
      const dias = diasEntre(fecha(it.inicio), HOY) + 1;
      const card = document.createElement("div");
      card.className = "card it-card";
      card.setAttribute("role", "button");
      card.setAttribute("tabindex", "0");
      card.innerHTML = `
        <div class="it-head">
          <div class="quien">
            <h3>${it.empleado}</h3>
            <div class="puesto">${it.puesto}</div>
            <div class="tipo">${it.tipo}${it.diagnostico ? " · " + it.diagnostico : ""}</div>
            <div style="margin-top:8px">${chipPelota(it)}</div>
          </div>
          <div class="it-dias">
            <div class="num">${dias}</div>
            <div class="label">días de baja</div>
          </div>
        </div>
        <div class="hitos">
          ${it.hitos.map(h => `
            <div class="hito ${h.done ? "done" : ""}">
              <div class="punto"></div>
              <div class="hlabel">${h.label}</div>
              <div class="hfecha">${fmtCorta(fecha(h.fecha))}</div>
            </div>
          `).join("")}
        </div>
        <div class="it-estado ${it.estado === "ok" ? "ok" : "warn"}">${it.estadoTexto}</div>
        <div class="it-abrir">Ver detalle →</div>
      `;
      card.addEventListener("click", () => abrirModalIT(it));
      card.addEventListener("keydown", e => { if (e.key === "Enter") abrirModalIT(it); });
      listaITs.appendChild(card);
    });

    // ---------- modal de detalle de IT ----------
    let overlay = null;
    function cerrarModal() {
      if (overlay) { overlay.remove(); overlay = null; }
    }
    function abrirModalIT(it) {
      cerrarModal();
      const dias = diasEntre(fecha(it.inicio), HOY) + 1;
      overlay = document.createElement("div");
      overlay.className = "overlay";
      overlay.innerHTML = `
        <div class="modal" role="dialog" aria-modal="true" aria-label="Detalle de la baja de ${it.empleado}">
          <button class="cerrar" aria-label="Cerrar">✕</button>
          <h3>${it.empleado} — ${it.tipo}</h3>
          <div class="msub">
            ${it.diagnostico ? it.diagnostico + " · " : ""}Día ${dias} de baja ·
            Reincorporación prevista: ${fmtLarga(it.previsionReincorporacion)}
            &nbsp;&nbsp;${chipPelota(it)}
          </div>
          <div class="tl">
            ${it.timeline.map(ev => `
              <div class="tl-item ${ev.ok === true ? "done" : ev.ok === false ? "pend" : ""}">
                <div class="tfecha">${fmtCorta(fecha(ev.fecha))}</div>
                <div class="ttexto">${ev.texto}</div>
              </div>
            `).join("")}
          </div>
          <div class="zinco-ahora">
            <div class="zt">Qué está haciendo Zinco ahora</div>
            <p>${it.zincoAhora}</p>
          </div>
        </div>
      `;
      // cierre con X y con click fuera del modal
      overlay.querySelector(".cerrar").addEventListener("click", cerrarModal);
      overlay.addEventListener("click", e => { if (e.target === overlay) cerrarModal(); });
      document.body.appendChild(overlay);
    }
    // cierre con Esc
    document.addEventListener("keydown", e => { if (e.key === "Escape") cerrarModal(); });
  </script>
</body>
</html>
